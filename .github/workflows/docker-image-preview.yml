name: build_preview_tag

on:
  push:
    tags:
      - 'v*-preview*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get git tag
        id: tag
        uses: dawidd6/action-get-tag@v1
        with:
          strip_v: false
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{steps.tag.outputs.tag}}
      - name: Build and push the preview docker image
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKER_USER }}/mnote:${{steps.tag.outputs.tag}}

  build-mnote-web:
    runs-on: ubuntu-latest
    steps:
      - name: Get git tag
        id: tag
        uses: dawidd6/action-get-tag@v1
        with:
          strip_v: false
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{steps.tag.outputs.tag}}
      - name: Build mnote-web preview image
        uses: docker/build-push-action@v7
        with:
          context: ./web
          platforms: linux/amd64
          push: true
          file: web/Dockerfile
          tags: ${{ secrets.DOCKER_USER }}/mnote-web:${{steps.tag.outputs.tag}}
