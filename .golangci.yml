version: "2"

run:
  timeout: 5m
  tests: true
  go: "1.24"

linters:
  default: none

  enable:
    # correctness / bug finding
    - bodyclose
    - contextcheck
    - copyloopvar
    - err113
    - errcheck
    - errorlint
    - gocritic
    - gosec
    - govet
    - ineffassign
    - nilerr
    - nilnil
    - noctx
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - unparam
    - unused

    # maintainability / readability
    - dupl
    - exhaustive
    - funlen
    - gocognit
    - gocyclo
    - interfacebloat
    - lll
    - misspell
    - nakedret
    - nestif
    - nolintlint
    - nonamedreturns
    - prealloc
    - revive
    - unconvert
    - whitespace
    - dogsled
    - makezero

    # engineering discipline
    - forbidigo
    - wrapcheck

    # architecture / safety
    - depguard
    - gochecknoinits
    - predeclared
    - asasalint
    - canonicalheader
    - fatcontext

  exclusions:
    generated: strict
    presets:
      - comments
      - common-false-positives
      - legacy

    rules:
      - path: '(.+)_test\.go'
        linters:
          - dupl
          - err113
          - errcheck
          - funlen
          - gochecknoinits
          - gocognit
          - gocyclo
          - gosec
          - lll
          - nestif
          - nilnil
          - noctx
          - revive
          - unparam
          - wrapcheck

      # interface definition files naturally duplicate mock implementations
      - path: '(repo_iface|svc_iface)\.go'
        linters:
          - dupl

      # oauth/ai/filestore 使用 init() 进行 provider 注册
      - path: '(internal/ai|internal/oauth|internal/filestore)/'
        linters:
          - gochecknoinits

      - path: '(^|/)(mock|mocks|testdata|vendor)/'
        linters:
          - dupl
          - gosec
          - lll
          - revive

      - path: '(^|/)cmd/.+/main\.go'
        linters:
          - err113
          - forbidigo
          - wrapcheck

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - io.Copy
        - io.CopyBuffer
        - io.CopyN
        - (*github.com/spf13/cobra.Command).MarkFlagRequired
        - github.com/xxxsen/common/logutil.Sync
        - go.uber.org/zap.(*Logger).Sync
        - go.uber.org/zap.(*SugaredLogger).Sync

    govet: {}

    copyloopvar:
      check-alias: true

    dupl:
      threshold: 120

    funlen:
      lines: 80
      statements: 50

    gocognit:
      min-complexity: 25

    gocyclo:
      min-complexity: 15

    interfacebloat:
      max: 5

    lll:
      line-length: 120
      tab-width: 2

    misspell:
      locale: US

    nestif:
      min-complexity: 4

    nolintlint:
      require-explanation: true
      require-specific: true
      allow-unused: false

    nonamedreturns:
      report-error-in-defer: true

    prealloc:
      simple: true
      range-loops: true
      for-loops: false

    makezero:
      always: false

    errorlint:
      errorf: true
      errorf-multi: true
      asserts: true
      comparison: true

    wrapcheck:
      ignore-sigs:
        - .Errorf(
        - errors.New(
        - errors.Unwrap(
        - errors.Join(
      ignore-package-globs:
        - encoding/*
        - github.com/pkg/errors

    forbidigo:
      forbid:
        - pattern: '^fmt\.Print.*$'
          msg: "不要提交调试输出，改用结构化日志"
        - pattern: '^print(ln)?$'
          msg: "不要使用内建 print/println"

    depguard:
      rules:
        # model 是领域叶子，只允许依赖标准库和 errcode
        model-is-leaf:
          files:
            - "**/internal/model/**"
          allow:
            - $gostd
            - github.com/xxxsen/mnote/internal/pkg/errcode

        # repo 层不得向上依赖 service/handler/job
        repo-no-business:
          files:
            - "**/internal/repo/**"
          deny:
            - pkg: github.com/xxxsen/mnote/internal/service
              desc: "repo 不得依赖 service 层"
            - pkg: github.com/xxxsen/mnote/internal/handler
              desc: "repo 不得依赖 handler 层"
            - pkg: github.com/xxxsen/mnote/internal/job
              desc: "repo 不得依赖 job 层"

        # service 层不得依赖 handler/job
        service-no-handler:
          files:
            - "**/internal/service/**"
          deny:
            - pkg: github.com/xxxsen/mnote/internal/handler
              desc: "service 不得依赖 handler 层"
            - pkg: github.com/xxxsen/mnote/internal/job
              desc: "service 不得依赖 job 层"

        # handler 不得反向依赖 job
        handler-no-job:
          files:
            - "**/internal/handler/**"
          deny:
            - pkg: github.com/xxxsen/mnote/internal/job
              desc: "handler 不得依赖 job 层"

        # cmd 是组装根，internal 不得反向 import cmd
        no-import-cmd:
          files:
            - "**/internal/**"
          deny:
            - pkg: github.com/xxxsen/mnote/cmd
              desc: "不得从 internal 反向依赖 cmd/ 入口"

    revive:
      enable-all-rules: false
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: early-return
        - name: empty-block
        - name: empty-lines
        - name: error-naming
        - name: error-return
        - name: exported
          arguments:
            - disableStutteringCheck
        - name: if-return
        - name: increment-decrement
        - name: indent-error-flow
        - name: modifies-parameter
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: redundant-import-alias
        - name: string-of-int
        - name: superfluous-else
        - name: time-equal
        - name: time-naming
        - name: unnecessary-if
        - name: unnecessary-stmt
        - name: unreachable-code
        - name: unused-parameter
          arguments:
            - allow-regex: "^_"
        - name: use-any
        - name: use-errors-new
        - name: use-waitgroup-go

formatters:
  enable:
    - gofumpt
    - goimports

  settings:
    gofumpt:
      extra-rules: true
      module-path: github.com/xxxsen/mnote

    goimports:
      local-prefixes:
        - github.com/xxxsen/mnote

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: true

severity:
  default: error
